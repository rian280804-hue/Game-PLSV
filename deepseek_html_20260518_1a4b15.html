            height: 12px;

        const useAudio = () => {
            const audioCtxRef = useRef(null);

            const getAudioCtx = () => {
                if (!audioCtxRef.current) {
                    try {
                        audioCtxRef.current = new(window.AudioContext || window.webkitAudioContext)();
                    } catch (e) {
                        return null;
                    }
                }
                return audioCtxRef.current;
            };

            const playTone = useCallback((freq, duration, type = 'sine', vol = 0.1) => {
                try {
                    const ctx = getAudioCtx();
                    if (!ctx) return;
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, ctx.currentTime);
                    gain.gain.setValueAtTime(vol, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + duration);
                } catch (e) { /* silent */ }
            }, []);

            const playCorrect = useCallback(() => {
                playTone(523, 0.1, 'sine', 0.1);
                setTimeout(() => playTone(659, 0.1, 'sine', 0.1), 100);
                setTimeout(() => playTone(784, 0.15, 'sine', 0.12), 200);
            }, [playTone]);

            const playWrong = useCallback(() => {
                playTone(200, 0.3, 'sawtooth', 0.08);
                setTimeout(() => playTone(150, 0.3, 'sawtooth', 0.06), 150);
            }, [playTone]);

            const playClick = useCallback(() => playTone(440, 0.05, 'sine', 0.03), [playTone]);
            const playLevelUp = useCallback(() => {
                [523, 659, 784, 1047].forEach((f, i) =>
                    setTimeout(() => playTone(f, 0.12, 'sine', 0.12), i * 100)
                );
            }, [playTone]);
            const playCoin = useCallback(() => playTone(1200, 0.06, 'sine', 0.08), [playTone]);
            const playVictory = useCallback(() => {
                [523, 659, 784, 1047, 784, 1047, 1319].forEach((f, i) =>
                    setTimeout(() => playTone(f, 0.15, 'sine', 0.15), i * 110)
                );
            }, [playTone]);

            return { playCorrect, playWrong, playClick, playLevelUp, playCoin, playVictory };
        };

                };
                localStorage.setItem('aljabar-game-save-v2', JSON.stringify(data));
            }, [unlockedLevels, score, xp, playerLevel, badges, diagnosticDone, totalCorrect, totalWrong, maxCombo, selectedChar, leaderboard, hearts, combo, gameHistory]);

            useEffect(() => {
                saveGame();
            }, [saveGame]);

            const addScore = useCallback((pts, isCorrect) => {
                if (isCorrect) {
                    const bonus = combo >= 2 ? Math.floor(combo / 2) * 5 : 0;
                    setScore(s => s + pts + bonus);
                    setCombo(c => {
                        const newCombo = c + 1;
                        setMaxCombo(m => Math.max(m, newCombo));
                        // Check badge combo
                        if (newCombo >= 3) {
                            setBadges(b => {
                                if (!b.find(badge => badge.id === 'combo3')) {
                                    return [...b, badgesList.find(bl => bl.id === 'combo3')];
                                }
                                return b;
                            });
                        }
                        if (newCombo >= 5) {
                            setBadges(b => {
                                if (!b.find(badge => badge.id === 'combo5')) {
                                    return [...b, badgesList.find(bl => bl.id === 'combo5')];
                                }
                                return b;
                            });
                        }
                        return newCombo;
                    });
                    setTotalCorrect(c => c + 1);
                    setXp(x => {
                        const newXp = x + pts;
                        if (newXp >= playerLevel * 100) {
                            setPlayerLevel(l => l + 1);
                            audio.playLevelUp();
                        }
                        return newXp;
                    });
                    audio.playCorrect();
                    // Check score badge
                    setScore(s => {
                        if (s + pts + bonus >= 100) {
                            setBadges(b => {
                                if (!b.find(badge => badge.id === 'score100')) {
                                    return [...b, badgesList.find(bl => bl.id === 'score100')];
                                }
                                return b;
                            });
                        }
                        return s + pts + bonus;
                    });
                } else {
                    setScore(s => Math.max(0, s - 5));
                    setCombo(0);
                    setHearts(h => Math.max(0, h - 1));
                    setTotalWrong(w => w + 1);
                    audio.playWrong();
                }
            }, [combo, playerLevel, audio]);

            const unlockLevel = useCallback((level) => {
                setUnlockedLevels(prev => {
                    if (prev.includes(level)) return prev;
                    return [...prev, level].sort((a, b) => a - b);
                });
            }, []);

            const addBadge = useCallback((badgeId) => {
                const badge = badgesList.find(b => b.id === badgeId);
                if (badge) {
                    setBadges(b => {
                        if (!b.find(existing => existing.id === badgeId)) {
                            return [...b, badge];
                        }
                        return b;
                    });
                }
            }, []);

            const resetGame = useCallback(() => {
                setScore(0);
                setXp(0);
                setPlayerLevel(1);
                setHearts(5);
                setCombo(0);
                setMaxCombo(0);
                setBadges([]);
                setTotalCorrect(0);
                setTotalWrong(0);
                setUnlockedLevels([1]);
                setCurrentLevel(1);
                setDiagnosticDone(false);
                setGameHistory([]);
                setSelectedChar(null);
                localStorage.removeItem('aljabar-game-save-v2');
            }, []);

            const addToLeaderboard = useCallback((name) => {
                const entry = {
                    name: name || selectedChar?.name || 'Pemain',
                    score,
                    level: currentLevel,
                    badges: badges.length,
                    date: new Date().toLocaleDateString('id-ID'),
                };
                setLeaderboard(prev => {
                    const updated = [...prev, entry].sort((a, b) => b.score - a.score).slice(0, 10);
                    return updated;
                });
            }, [score, currentLevel, badges, selectedChar]);

            const handleExportExcel = useCallback(() => {
                let csv = 'Data Hasil Belajar Petualangan Angka Aljabar\n';
                csv += 'Kategori,Nilai\n';
                csv += `Skor Akhir,${score}\n`;
                csv += `Jawaban Benar,${totalCorrect}\n`;
                csv += `Jawaban Salah,${totalWrong}\n`;
                csv += `Level Tertinggi,${Math.max(...unlockedLevels)}\n`;
                csv += `Badge Diperoleh,${badges.map(b => b.name).join('; ')}\n`;
                csv += `Player Level,${playerLevel}\n`;
                csv += `Max Combo,${maxCombo}\n`;
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'hasil-belajar-aljabar.csv';
                a.click();
                URL.revokeObjectURL(url);
            }, [score, totalCorrect, totalWrong, unlockedLevels, badges, playerLevel, maxCombo]);

            const handleShareWA = useCallback(() => {
                const text = `🏰 *Petualangan Angka Aljabar* 🏰\n\n🎮 Skor: *${score}*\n⭐ Level: *${currentLevel}*\n✅ Benar: ${totalCorrect}\n❌ Salah: ${totalWrong}\n🏅 Badge: ${badges.length}\n💡 Combo Max: ${maxCombo}x\n\n📚 Ayo belajar aljabar bersama!`;
                window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
            }, [score, currentLevel, totalCorrect, totalWrong, badges, maxCombo]);

            const navigateTo = useCallback((newScreen) => {
                audio.playClick();
                setScreen(newScreen);
            }, [audio]);

            return (
                <div className="min-h-screen game-bg relative">
                    {/* Star particles background */}
                    {Array.from({ length: 25 }).map((_, i) => (
                        <div
                            key={i}
                            className="absolute rounded-full bg-white pointer-events-none"
                            style={{
                                left: Math.random() * 100 + '%',
                                top: Math.random() * 100 + '%',
                                width: (Math.random() * 3 + 1) + 'px',
                                height: (Math.random() * 3 + 1) + 'px',
                                opacity: Math.random() * 0.6 + 0.2,
                                animation: `twinkle ${Math.random() * 3 + 2}s ease-in-out infinite`,
                                animationDelay: Math.random() * 2 + 's',
                            }}
                        />
                    ))}

                    {/* Screen Router */}
                    {screen === 'intro' && (
                        <IntroScreen
                            onStart={() => {
                                if (!selectedChar) navigateTo('character');
                                else if (!diagnosticDone) navigateTo('diagnostic');
                                else navigateTo('game');
                            }}
                            onReset={resetGame}
                            hasSave={!!localStorage.getItem('aljabar-game-save-v2') && unlockedLevels.length > 0}
                            hasCharSelected={!!selectedChar}
                            audio={audio}
                        />
                    )}

                    {screen === 'character' && (
                        <CharacterSelect
                            characters={characters}
                            selectedChar={selectedChar}
                            setSelectedChar={(char) => {
                                setSelectedChar(char);
                                audio.playClick();
                            }}
                            onNext={() => {
                                if (!diagnosticDone) navigateTo('diagnostic');
                                else navigateTo('game');
                            }}
                            selectedChar={selectedChar}
                        />
                    )}

                    {screen === 'diagnostic' && (
                        <DiagnosticTest
                            onComplete={(diagScore) => {
                                setDiagnosticDone(true);
                                audio.playLevelUp();
                                navigateTo('game');
                            }}
                            audio={audio}
                        />
                    )}

                    {screen === 'game' && (
                        <GameScreen
                            currentLevel={currentLevel}
                            setCurrentLevel={setCurrentLevel}
                            unlockedLevels={unlockedLevels}
                            unlockLevel={unlockLevel}
                            score={score}
                            addScore={addScore}
                            hearts={hearts}
                            setHearts={setHearts}
                            combo={combo}
                            setCombo={setCombo}
                            xp={xp}
                            playerLevel={playerLevel}
                            selectedChar={selectedChar}
                            badges={badges}
                            addBadge={addBadge}
                            totalCorrect={totalCorrect}
                            totalWrong={totalWrong}
                            setScreen={setScreen}
                            audio={audio}
                            spawnConfetti={spawnConfetti}
                            allQuestionsData={allQuestionsData}
                            setGameHistory={setGameHistory}
                            navigateTo={navigateTo}
                        />
                    )}

                    {screen === 'result' && (
                        <ResultScreen
                            score={score}
                            totalCorrect={totalCorrect}
                            totalWrong={totalWrong}
                            badges={badges}
                            playerLevel={playerLevel}
                            currentLevel={currentLevel}
                            maxCombo={maxCombo}
                            selectedChar={selectedChar}
                            onReplay={() => {
                                setHearts(5);
                                setCombo(0);
                                navigateTo('game');
                            }}
                            onHome={() => navigateTo('intro')}
                            onExportExcel={handleExportExcel}
                            onShareWA={handleShareWA}
                            addToLeaderboard={addToLeaderboard}
                            leaderboard={leaderboard}
                            spawnConfetti={spawnConfetti}
                        />
                    )}

                    {screen === 'report' && (
                        <ReportScreen
                            score={score}
                            totalCorrect={totalCorrect}
                            totalWrong={totalWrong}
                            badges={badges}
                            playerLevel={playerLevel}
                            currentLevel={currentLevel}
                            maxCombo={maxCombo}
                            unlockedLevels={unlockedLevels}
                            gameHistory={gameHistory}
                            onBack={() => navigateTo('game')}
                            onExportExcel={handleExportExcel}
                            onShareWA={handleShareWA}
                        />
                    )}
                </div>
            );
        };

        // ==================== INTRO SCREEN ====================
        const IntroScreen = ({ onStart, onReset, hasSave, hasCharSelected, audio }) => {
            const [showContent, setShowContent] = useState(false);

            useEffect(() => {
                const timer = setTimeout(() => setShowContent(true), 300);
                return () => clearTimeout(timer);
            }, []);

            return (
                <div className="flex flex-col items-center justify-center min-h-screen px-4 py-8 text-center">
                    <div className="animate-float mb-4">
                        <span className="text-7xl md:text-8xl" role="img" aria-label="castle">🏰</span>
                    </div>
                    
                    <h1 className="font-game text-3xl md:text-5xl text-white glow-text mb-3" style={{fontFamily: "'Fredoka One', cursive"}}>
                        Petualangan<br/>Angka Aljabar
                    </h1>
                    
                    <p className="text-lg md:text-xl text-purple-200 mb-2" style={{fontFamily: "'Quicksand', sans-serif"}}>
                        🧙‍♂️ Selamatkan Dunia Numerik! 🌌
                    </p>
                    
                    <p className="text-sm text-blue-300 mb-6" style={{fontFamily: "'Nunito', sans-serif"}}>
                        Game Edukasi Matematika SMP Kelas 8
                    </p>

                    {/* Animated monsters */}
                    <div className="flex gap-4 md:gap-8 mb-6">
                        <span className="text-3xl md:text-4xl animate-float" role="img" style={{animationDelay: '0s'}}>🐛</span>
                        <span className="text-3xl md:text-4xl animate-float" role="img" style={{animationDelay: '0.3s'}}>🦎</span>
                        <span className="text-3xl md:text-4xl animate-float" role="img" style={{animationDelay: '0.6s'}}>🐺</span>
                        <span className="text-3xl md:text-4xl animate-float" role="img" style={{animationDelay: '0.9s'}}>👹</span>
                    </div>

                    <div className={`flex flex-col gap-3 transition-all duration-700 ${showContent ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8'}`}>
                        <button
                            onClick={onStart}
                            className="btn-game text-lg px-8 py-3 animate-pulse-glow"
                        >
                            {hasSave && hasCharSelected ? '💾 Lanjutkan Petualangan' : '⚡ Mulai Petualangan'}
                        </button>
                        
                        {hasSave && (
                            <button
                                onClick={() => {
                                    if (confirm('Yakin ingin mereset semua progress? Data tidak bisa dikembalikan!')) {
                                        onReset();
                                    }
                                }}
                                className="btn-game btn-warning text-base"
                            >
                                🔄 Reset Progress
                            </button>
                        )}
                    </div>

                    <div className="mt-6 flex gap-3 flex-wrap justify-center">
                        <span className="text-xl animate-spin-slow">🌟</span>
                        <span className="text-xl animate-spin-slow" style={{animationDelay: '0.5s'}}>⭐</span>
                        <span className="text-xl animate-spin-slow" style={{animationDelay: '1s'}}>💫</span>
                        <span className="text-xl animate-spin-slow" style={{animationDelay: '1.5s'}}>✨</span>
                    </div>
                </div>
            );
        };

        // ==================== CHARACTER SELECT ====================
        const CharacterSelect = ({ characters, selectedChar, setSelectedChar, onNext }) => {
            return (
                <div className="flex flex-col items-center justify-center min-h-screen px-4 py-8">
                    <h2 className="text-2xl md:text-4xl text-white mb-2 text-center" style={{fontFamily: "'Fredoka One', cursive"}}>
                        Pilih Karaktermu! 🦸
                    </h2>
                    <p className="text-purple-200 mb-6 text-center" style={{fontFamily: "'Quicksand', sans-serif"}}>
                        Siapa yang akan menjelajahi dunia aljabar?
                    </p>
                    
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 max-w-4xl w-full mb-6">
                        {characters.map(char => (
                            <div
                                key={char.id}
                                onClick={() => setSelectedChar(char)}
                                className={`character-card card-game p-5 text-center ${selectedChar?.id === char.id ? 'selected' : ''}`}
                                style={{borderColor: selectedChar?.id === char.id ? '#fde047' : 'transparent'}}
                            >
                                <span className="text-5xl block mb-3">{char.emoji}</span>
                                <h3 className="text-white text-lg mb-1" style={{fontFamily: "'Fredoka One', cursive"}}>{char.name}</h3>
                                <p className="text-gray-300 text-sm" style={{fontFamily: "'Nunito', sans-serif"}}>{char.desc}</p>
                            </div>
                        ))}
                    </div>
                    
                    <button
                        onClick={onNext}
                        disabled={!selectedChar}
                        className={`btn-game text-lg px-8 ${!selectedChar ? 'opacity-50 cursor-not-allowed' : 'animate-pulse-glow'}`}
                    >
                        {selectedChar ? '🚀 Lanjutkan!' : '👆 Pilih Karakter Dulu'}
                    </button>
                </div>
            );
        };

        // ==================== DIAGNOSTIC TEST ====================
        const DiagnosticTest = ({ onComplete, audio }) => {
            const [step, setStep] = useState(0);
            const [answers, setAnswers] = useState([]);
            const [selectedOption, setSelectedOption] = useState(null);
            const [feedback, setFeedback] = useState(null);
            
            const questions = [
                { q: 'Berapakah koefisien dari x pada 5x + 3?', options: ['5', 'x', '3', '8'], answer: 0 },
                { q: 'Suku sejenis dari 4a² adalah...', options: ['4a', '3a²', '4b²', 'a³'], answer: 1 },
                { q: '(2x + 1) + (3x - 2) = ...', options: ['5x-1', '5x+3', '5x-3', 'x-1'], answer: 0 },
                { q: '(5a - 2) - (2a + 1) = ...', options: ['3a-3', '3a+1', '7a-1', '3a-1'], answer: 0 },
                { q: '2 × (x + 3) = ...', options: ['2x+6', '2x+3', 'x+6', '2x+5'], answer: 0 },
            ];

            const handleAnswer = (idx) => {
                if (feedback) return;
                setSelectedOption(idx);
                const isCorrect = idx === questions[step].answer;
                setFeedback(isCorrect ? 'correct' : 'wrong');
                const newAnswers = [...answers, { question: step, correct: isCorrect }];
                setAnswers(newAnswers);
                
                if (isCorrect) audio.playCorrect();
                else audio.playWrong();
                
                setTimeout(() => {
                    setFeedback(null);
                    setSelectedOption(null);
                    if (step < questions.length - 1) {
                        setStep(step + 1);
                    } else {
                        const correctCount = newAnswers.filter(a => a.correct).length;
                        onComplete(correctCount);
                    }
                }, 800);
            };

            const currentQ = questions[step];

            return (
                <div className="flex flex-col items-center justify-center min-h-screen px-4 py-8">
                    <div className="card-game p-6 md:p-10 max-w-lg w-full text-center">
                        <span className="text-4xl mb-3 block">📝</span>
                        <h2 className="text-2xl md:text-3xl text-white mb-2" style={{fontFamily: "'Fredoka One', cursive"}}>
                            Asesmen Diagnostik Awal
                        </h2>
                        <p className="text-purple-200 mb-4" style={{fontFamily: "'Quicksand', sans-serif"}}>
                            Yuk, kita cek pemahaman awalmu! Soal {step + 1} dari {questions.length}
                        </p>
                        
                        <div className="progress-bar mb-5 h-3">
                            <div className="progress-fill" style={{width: `${((step + 1) / questions.length) * 100}%`}}></div>
                        </div>
                        
                        <p className="text-white text-lg font-semibold mb-5" style={{fontFamily: "'Nunito', sans-serif"}}>
                            {currentQ.q}
                        </p>
                        
                        <div className="space-y-3">
                            {currentQ.options.map((opt, i) => (
                                <button
                                    key={i}
                                    onClick={() => handleAnswer(i)}
                                    disabled={!!feedback}
                                    className={`option-btn w-full text-white px-5 py-3 rounded-2xl border-2 text-left transition-all ${
                                        feedback && i === currentQ.answer ? 'correct-flash border-green-400' : 
                                        feedback && i === selectedOption && i !== currentQ.answer ? 'wrong-flash border-red-400' :
                                        'bg-white/10 border-white/20 hover:border-purple-400'
                                    }`}
                                    style={{fontFamily: "'Nunito', sans-serif"}}
                                >
                                    <span className="font-bold text-purple-300 mr-2">{String.fromCharCode(65 + i)}.</span> {opt}
                                </button>
                            ))}
                        </div>
                        
                        {feedback && (
                            <div className={`mt-4 text-2xl animate-pop ${feedback === 'correct' ? 'text-green-400' : 'text-red-400'}`}>
                                {feedback === 'correct' ? '🎉 Benar!' : '😢 Coba lagi!'}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ==================== GAME SCREEN ====================
        const GameScreen = ({
            currentLevel,
            setCurrentLevel,
            unlockedLevels,
            unlockLevel,
            score,
            addScore,
            hearts,
            setHearts,
            combo,
            xp,
            playerLevel,
            selectedChar,
            badges,
            addBadge,
            totalCorrect,
            totalWrong,
            setScreen,
            audio,
            spawnConfetti,
            allQuestionsData,
            setGameHistory,
            navigateTo,
        }) => {
            const [gameState, setGameState] = useState('select'); // select | playing | complete | failed
            const [currentQ, setCurrentQ] = useState(0);
            const [monsterHP, setMonsterHP] = useState(0);
            const [timer, setTimer] = useState(0);
            const [levelScore, setLevelScore] = useState(0);
            const [levelCorrect, setLevelCorrect] = useState(0);
            const [feedback, setFeedback] = useState(null);
            const [fillAnswer, setFillAnswer] = useState('');
            const [selectedOption, setSelectedOption] = useState(null);
            const [isPaused, setIsPaused] = useState(false);
            const [showHint, setShowHint] = useState(false);
            const timerRef = useRef(null);
            
            const levelData = allQuestionsData[currentLevel];

            // Timer for boss battle
            useEffect(() => {
                if (gameState === 'playing' && !isPaused && levelData?.bossBattle) {
                    timerRef.current = setInterval(() => {
                        setTimer(t => {
                            if (t >= (levelData.timeLimit || 90)) {
                                clearInterval(timerRef.current);
                                setGameState('failed');
                                return t;
                            }
                            return t + 1;
                        });
                    }, 1000);
                }
                return () => {
                    if (timerRef.current) clearInterval(timerRef.current);
                };
            }, [gameState, isPaused, levelData]);

            const startLevel = (lvl) => {
                setCurrentLevel(lvl);
                const data = allQuestionsData[lvl];
                setGameState('playing');
                setCurrentQ(0);
                setMonsterHP(data.monsterHP);
                setTimer(0);
                setLevelScore(0);
                setLevelCorrect(0);
                setFeedback(null);
                setFillAnswer('');
                setSelectedOption(null);
                setShowHint(false);
                setIsPaused(false);
                audio.playClick();
            };

            const handleAnswer = (isCorrect, points) => {
                if (feedback) return;
                
                setFeedback(isCorrect ? 'correct' : 'wrong');
                addScore(points, isCorrect);
                
                if (isCorrect) {
                    setLevelScore(s => s + points);
                    setLevelCorrect(c => c + 1);
                    const newHP = monsterHP - 1;
                    setMonsterHP(newHP);
                    audio.playCoin();
                }
                
                setTimeout(() => {
                    setFeedback(null);
                    setFillAnswer('');
                    setSelectedOption(null);
                    
                    if (isCorrect && monsterHP - 1 <= 0) {
                        // Level complete!
                        setGameState('complete');
                        if (timerRef.current) clearInterval(timerRef.current);
                        
                        let timeBonus = 0;
                        if (levelData?.bossBattle) {
                            timeBonus = Math.max(0, (levelData.timeLimit - timer) * 2);
                            setLevelScore(s => s + timeBonus);
                            addScore(timeBonus, true);
                        }
                        
                        unlockLevel(currentLevel + 1);
                        if (currentLevel === 1) addBadge('first_blood');
                        if (levelCorrect + 1 === levelData.questions.length) addBadge('perfect');
                        if (currentLevel === 6) addBadge('boss_slayer');
                        if (currentLevel >= 6) addBadge('all_levels');
                        
                        spawnConfetti();
                        audio.playVictory();
                        
                        setGameHistory(prev => [...prev, {
                            level: currentLevel,
                            score: levelScore + points + timeBonus,
                            correct: levelCorrect + 1,
                            time: timer,
                            date: new Date().toISOString(),
                        }]);
                    } else if (currentQ < levelData.questions.length - 1) {
                        setCurrentQ(q => q + 1);
                    } else if (!isCorrect && hearts <= 1) {
                        setGameState('failed');
                        if (timerRef.current) clearInterval(timerRef.current);
                    } else if (isCorrect && monsterHP - 1 > 0 && currentQ >= levelData.questions.length - 1) {
                        // Reset questions but keep monster HP
                        setCurrentQ(0);
                    } else if (!isCorrect && currentQ >= levelData.questions.length - 1) {
                        setGameState('failed');
                        if (timerRef.current) clearInterval(timerRef.current);
                    }
                }, 700);
            };

            const handleFillSubmit = () => {
                if (feedback || !fillAnswer.trim()) return;
                const q = levelData.questions[currentQ];
                const userAnswer = fillAnswer.trim().toLowerCase().replace(/\s+/g, '');
                const correctAnswers = [
                    q.answer.toLowerCase().replace(/\s+/g, ''),
                    ...(q.alternatives || []).map(a => a.toLowerCase().replace(/\s+/g, ''))
                ];
                handleAnswer(correctAnswers.includes(userAnswer), q.points || 15);
            };

            // Level Select Screen
            if (gameState === 'select') {
                const levelPreviews = [
                    { lvl: 1, title: 'Variabel & Koefisien', icon: '🌱', monster: '🐛', color: 'from-green-400 to-emerald-500' },
                    { lvl: 2, title: 'Suku Sejenis', icon: '🌿', monster: '🦎', color: 'from-teal-400 to-cyan-500' },
                    { lvl: 3, title: 'Penjumlahan Aljabar', icon: '🍃', monster: '🐺', color: 'from-blue-400 to-indigo-500' },
                    { lvl: 4, title: 'Pengurangan Aljabar', icon: '🍂', monster: '🐉', color: 'from-purple-400 to-pink-500' },
                    { lvl: 5, title: 'Perkalian Aljabar', icon: '🌳', monster: '🦂', color: 'from-orange-400 to-red-500' },
                    { lvl: 6, title: 'BOSS BATTLE', icon: '👑', monster: '👹', color: 'from-red-500 to-yellow-500', isBoss: true },
                ];

                return (
                    <div className="flex flex-col items-center min-h-screen px-4 py-4">
                        {/* Header */}
                        <div className="w-full max-w-4xl flex justify-between items-center mb-4 flex-wrap gap-3">
                            <div className="flex items-center gap-3">
                                <span className="text-3xl">{selectedChar?.emoji || '🧙‍♂️'}</span>
                                <div>
                                    <p className="text-white text-sm" style={{fontFamily: "'Fredoka One', cursive"}}>{selectedChar?.name || 'Petualang'}</p>
                                    <p className="text-purple-300 text-xs" style={{fontFamily: "'Nunito', sans-serif"}}>Lv. {playerLevel} | XP: {xp}</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-4 flex-wrap">

        // ==================== RESULT SCREEN ====================
        const ResultScreen = ({
            score, totalCorrect, totalWrong, badges, playerLevel, currentLevel, maxCombo,

        }) => {

                            <div className="bg-white/10 rounded-2xl p-3 text-center">

                                <p className="text-gray-300 text-xs">Max Combo</p>
                            </div>
                            <div className="bg-white/10 rounded-2xl p-3 text-center">

                                <p className="text-gray-300 text-xs">Badge</p>

                        </div>

                        <div className="mb-5">

                            <div className="flex h-8 rounded-full overflow-hidden">
                                {totalCorrect + totalWrong > 0 ? (
                                    <>
                                        <div className="bg-green-500 flex items-center justify-center text-xs font-bold text-white" style={{width: `${accuracy}%`}}>
                                            {accuracy > 20 ? `✅ ${totalCorrect}` : ''}

                            </div>
                        </div>

                        {gameHistory.length > 0 && (
                            <div className="mb-5">
                                <h3 className="text-white mb-2" style={{fontFamily: "'Fredoka One', cursive"}}>📜 Riwayat Level</h3>
                                <div className="space-y-1.5 max-h-36 overflow-y-auto scrollbar-custom">
                                    {gameHistory.map((h, i) => (
                                        <div key={i} className="bg-white/5 rounded-xl p-2.5 flex justify-between text-sm">
                                            <span className="text-white">Level {h.level}</span>
                                            <span className="text-yellow-400">⭐{h.score}</span>
                                            <span className="text-green-400">✅{h.correct}</span>
                                            <span className="text-gray-400">{new Date(h.date).toLocaleDateString('id-ID')}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        <div className="bg-purple-500/20 border border-purple-400/30 rounded-2xl p-4 mb-5">
                            <h3 className="text-white mb-2" style={{fontFamily: "'Fredoka One', cursive"}}>💡 Rekomendasi Belajar</h3>
                            <p className="text-purple-200 text-sm" style={{fontFamily: "'Nunito', sans-serif"}}>{getRecommendation()}</p>
                        </div>

                        <div className="flex gap-2 flex-wrap justify-center">
                            <button onClick={onExportExcel} className="btn-game btn-success">📥 Export Excel</button>
                            <button onClick={onShareWA} className="btn-game bg-green-500 hover:bg-green-600">💬 Kirim WA</button>
                            <button onClick={() => window.print()} className="btn-game bg-blue-500 hover:bg-blue-600">🖨️ Cetak</button>
                        </div>
                    </div>
                </div>
            );
        };

        // ==================== RENDER APP ====================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
