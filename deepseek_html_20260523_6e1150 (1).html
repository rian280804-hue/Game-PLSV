<!DOCTYPE html>
<html lang="id">
<head>

    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&family=Quicksand:wght@400;600;700&display=swap');
        :root {
            --blue-light: #7dd3fc;
            --yellow: #fde047;
            --green-neon: #a3e635;
            --orange: #fb923c;
            --purple-pastel: #c4b5fd;
        }
        * {
            scroll-behavior: smooth;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Nunito', sans-serif;
            overflow-x: hidden;
            background: linear-gradient(135deg, #0f0a2e 0%, #1a1040 30%, #0d1b3e 60%, #0f0a2e 100%);
            min-height: 100vh;
        }
        .game-bg {
            background: radial-gradient(ellipse at 20% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 50%), radial-gradient(ellipse at 80% 60%, rgba(236, 72, 153, 0.1) 0%, transparent 50%), radial-gradient(ellipse at 50% 80%, rgba(34, 211, 238, 0.1) 0%, transparent 50%), linear-gradient(180deg, #0f0a2e 0%, #1a1040 50%, #0d1b3e 100%);
        }
        .card-game {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .btn-game {
            background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
            border: none;
            border-radius: 50px;
            padding: 12px 28px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 24px rgba(139, 92, 246, 0.4);
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            font-family: 'Fredoka One', cursive;
        }
        .btn-game:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 32px rgba(139, 92, 246, 0.6);
        }
        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
        }
        .btn-warning {
            background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
        }
        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #f87171 100%);
        }
        .btn-info {
            background: linear-gradient(135deg, #06b6d4 0%, #22d3ee 100%);
        }
        .btn-home {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            box-shadow: 0 6px 24px rgba(99, 102, 241, 0.4);
        }
        .progress-bar {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            overflow: hidden;
            height: 12px;
        }
        .progress-fill {
            background: linear-gradient(90deg, #8b5cf6, #ec4899, #f59e0b);
            height: 100%;
            border-radius: 50px;
            transition: width 0.8s ease;
        }
        .timer-bar {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            overflow: hidden;
            height: 8px;
        }
        .timer-fill {
            height: 100%;
            border-radius: 50px;
            transition: width 1s linear;
        }
        .timer-fill.normal {
            background: linear-gradient(90deg, #10b981, #34d399);
        }
        .timer-fill.warning {
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
        }
        .timer-fill.danger {
            background: linear-gradient(90deg, #ef4444, #f87171);
            animation: pulse 0.5s infinite;
        }
        .glow-text {
            text-shadow: 0 0 20px rgba(139, 92, 246, 0.8), 0 0 40px rgba(236, 72, 153, 0.4);
        }
        @keyframes float {
            0%,
            100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-15px);
            }
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }
        @keyframes pop {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            70% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-10px);
            }
            75% {
                transform: translateX(10px);
            }
        }
        @keyframes confettiFall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }
        @keyframes reviewGlow {
            0%,
            100% {
                box-shadow: 0 0 15px rgba(245, 158, 11, 0.3);
            }
            50% {
                box-shadow: 0 0 30px rgba(245, 158, 11, 0.7);
            }
        }
        @keyframes hpDecrease {
            0% {
                transform: scale(1.3);
            }
            100% {
                transform: scale(1);
            }
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-float {
            animation: float 3s infinite;
        }
        .animate-pop {
            animation: pop 0.3s ease-out;
        }
        .animate-shake {
            animation: shake 0.5s ease-in-out;
        }
        .animate-review-glow {
            animation: reviewGlow 1.5s infinite;
        }
        .animate-hp-decrease {
            animation: hpDecrease 0.4s ease-out;
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }
        .monster-card {
            animation: float 4s infinite;
            filter: drop-shadow(0 0 30px rgba(255, 100, 100, 0.5));
        }
        .confetti-piece {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            animation: confettiFall 3s forwards;
        }
        .option-btn {
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .option-btn:hover {
            transform: scale(1.02);
            border-color: #8b5cf6 !important;
        }
        .option-btn.wrong-flash {
            background: rgba(239, 68, 68, 0.3) !important;
            border-color: #ef4444 !important;
            animation: shake 0.5s ease-in-out;
        }
        .level-completed-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #10b981;
            color: white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.5);
        }
        .review-mode-badge {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: #000;
            padding: 4px 12px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 12px;
            animation: reviewGlow 1.5s infinite;
        }
        .materi-step {
            background: rgba(139, 92, 246, 0.2);
            border-left: 3px solid #8b5cf6;
            padding: 12px 16px;
            border-radius: 0 12px 12px 0;
            margin: 8px 0;
        }
        .story-scene {
            border: 2px solid rgba(245, 158, 11, 0.4);
            border-radius: 16px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.3);
            margin: 12px 0;
            text-align: center;
        }
        .scrollbar-custom::-webkit-scrollbar {
            width: 6px;
        }
        .scrollbar-custom::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        .scrollbar-custom::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #8b5cf6, #ec4899);
            border-radius: 10px;
        }
        @media (max-width: 640px) {
            .btn-game {
                padding: 10px 20px;
                font-size: 14px;
            }
            .card-game {
                border-radius: 16px;
                padding: 16px !important;
            }
        }
    </style>
</head>
<body class="game-bg">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ==================== AUDIO ENGINE ====================
        const useGameAudio = () => {
            const audioCtxRef = useRef(null);
            const masterGainRef = useRef(null);
            const musicGainRef = useRef(null);
            const sfxGainRef = useRef(null);
            const isMusicPlayingRef = useRef(false);
            const musicIntervalRef = useRef(null);
            const currentMelodyRef = useRef(0);
            const initAudio = useCallback(() => { if (!audioCtxRef.current) { try { audioCtxRef.current = new(window
                            .AudioContext || window.webkitAudioContext)();
                        masterGainRef.current = audioCtxRef.current.createGain();
                        masterGainRef.current.gain.setValueAtTime(0.8, audioCtxRef.current.currentTime);
                        masterGainRef.current.connect(audioCtxRef.current.destination);
                        musicGainRef.current = audioCtxRef.current.createGain();
                        musicGainRef.current.gain.setValueAtTime(0.35, audioCtxRef.current.currentTime);
                        musicGainRef.current.connect(masterGainRef.current);
                        sfxGainRef.current = audioCtxRef.current.createGain();
                        sfxGainRef.current.gain.setValueAtTime(0.5, audioCtxRef.current.currentTime);
                        sfxGainRef.current.connect(masterGainRef.current); } catch (e) { return null; } } return audioCtxRef
                    .current; }, []);
            const playTone = useCallback((freq, duration, type = 'sine', vol = 0.2, isMusic = false) => { const ctx =
                    initAudio(); if (!ctx) return; const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(vol, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                osc.connect(gain); if (isMusic) gain.connect(musicGainRef.current); else gain.connect(sfxGainRef
                    .current);
                osc.start();
                osc.stop(ctx.currentTime + duration); }, [initAudio]);
            const playCorrect = useCallback(() => { playTone(523, 0.12, 'sine', 0.5);
                setTimeout(() => playTone(659, 0.12, 'sine', 0.5), 100);
                setTimeout(() => playTone(784, 0.18, 'sine', 0.55), 200); }, [playTone]);
            const playWrong = useCallback(() => { playTone(200, 0.35, 'sawtooth', 0.35);
                setTimeout(() => playTone(150, 0.45, 'sawtooth', 0.25), 150); }, [playTone]);
            const playClick = useCallback(() => playTone(440, 0.06, 'sine', 0.2), [playTone]);
            const playLevelUp = useCallback(() => { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f,
                    0.18, 'sine', 0.55), i * 120)); }, [playTone]);
            const playCoin = useCallback(() => { playTone(1200, 0.1, 'sine', 0.35);
                setTimeout(() => playTone(1500, 0.12, 'sine', 0.4), 80); }, [playTone]);
            const playVictory = useCallback(() => { [523, 659, 784, 1047, 784, 1047, 1319].forEach((f, i) => setTimeout(
                    () => playTone(f, 0.25, 'sine', 0.6), i * 130)); }, [playTone]);
            const playBossWarning = useCallback(() => { [200, 250, 200, 250].forEach((f, i) => setTimeout(() => playTone(
                    f, 0.35, 'square', 0.4), i * 400)); }, [playTone]);
            const playTimerWarning = useCallback(() => { playTone(600, 0.15, 'sine', 0.3);
                setTimeout(() => playTone(500, 0.15, 'sine', 0.3), 200); }, [playTone]);
            const playCombo = useCallback(() => { [800, 1000, 1200].forEach((f, i) => setTimeout(() => playTone(f, 0.1,
                    'sine', 0.4), i * 80)); }, [playTone]);
            const playReviewStart = useCallback(() => { playTone(350, 0.2, 'sine', 0.3);
                setTimeout(() => playTone(450, 0.2, 'sine', 0.3), 200);
                setTimeout(() => playTone(550, 0.3, 'sine', 0.4), 400); }, [playTone]);
            const playHpDecrease = useCallback(() => { playTone(800, 0.08, 'sine', 0.3);
                setTimeout(() => playTone(600, 0.1, 'sine', 0.25), 80); }, [playTone]);
            const musicalScales = [
                [262, 294, 330, 349, 392, 349, 330, 294],
                [262, 330, 392, 523, 392, 330, 294, 262],
            ];
            const bassNotes = [
                [131, 131, 165, 165, 175, 175, 165, 131],
                [131, 165, 175, 196, 175, 165, 131, 131],
            ];
            const playBackgroundMusic = useCallback(() => { if (isMusicPlayingRef.current) return;
                    isMusicPlayingRef.current = true; const playMelodyNote = () => { const melody =
                            musicalScales[currentMelodyRef.current % musicalScales.length]; const bass =
                            bassNotes[currentMelodyRef.current % bassNotes.length]; const noteIndex = Math.floor(
                            Date.now() / 300) % melody.length;
                        playTone(melody[noteIndex], 0.3, 'sine', 0.25, true);
                        playTone(bass[noteIndex], 0.35, 'triangle', 0.2, true); if (noteIndex % 2 === 0) playTone(
                            melody[noteIndex] * 1.5, 0.25, 'sine', 0.12, true); if (noteIndex === melody.length -
                            1) currentMelodyRef.current++; };
                    playMelodyNote();
                    musicIntervalRef.current = setInterval(playMelodyNote, 300); }, [playTone]);
            const stopBackgroundMusic = useCallback(() => { if (musicIntervalRef.current) { clearInterval(
                        musicIntervalRef.current);
                    musicIntervalRef.current = null; }
                isMusicPlayingRef.current = false; }, []);
            const setMusicVolume = useCallback((vol) => { if (musicGainRef.current && audioCtxRef.current) musicGainRef
                    .current.gain.setValueAtTime(vol, audioCtxRef.current.currentTime); }, []);
            const setSfxVolume = useCallback((vol) => { if (sfxGainRef.current && audioCtxRef.current) sfxGainRef.current
                    .gain.setValueAtTime(vol, audioCtxRef.current.currentTime); }, []);
            useEffect(() => { return () => { if (musicIntervalRef.current) clearInterval(musicIntervalRef.current); if (
                        audioCtxRef.current) audioCtxRef.current.close(); }; }, []);
            return { playCorrect, playWrong, playClick, playLevelUp, playCoin, playVictory, playBossWarning,
                playTimerWarning, playCombo, playReviewStart, playHpDecrease, playBackgroundMusic, stopBackgroundMusic,
                setMusicVolume, setSfxVolume, initAudio };
        };

        // ==================== CONFETTI ====================
        const spawnConfetti = () => { const colors = ['#fde047', '#a3e635', '#7dd3fc', '#fb923c', '#c4b5fd', '#f472b6',
                '#34d399', '#fbbf24'
            ]; for (let i = 0; i < 50; i++) { const el = document.createElement('div');
            el.className = 'confetti-piece';
            el.style.left = Math.random() * 100 + '%';
            el.style.top = -(Math.random() * 30 + 10) + 'px';
            el.style.width = (Math.random() * 8 + 5) + 'px';
            el.style.height = (Math.random() * 8 + 5) + 'px';
            el.style.background = colors[Math.floor(Math.random() * colors.length)];
            el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
            el.style.animationDuration = (Math.random() * 2 + 2) + 's';
            el.style.animationDelay = Math.random() * 0.6 + 's';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3500); } };

        // ==================== DATA SOAL ====================

                { id: 1, type: 'multiple', q: 'Bentuk umum dari PLSV yang benar adalah...', options: ['ax² + bx + c = 0', 'ax + b = c', 'ax + by = c', 'ax + b > c'], answer: 1, points: 10 },
                { id: 2, type: 'multiple', q: 'Pada persamaan 4x - 7 = 9, koefisien dari x adalah...', options: ['-7', '9', '4', 'x'], answer: 2, points: 10 },
                { id: 3, type: 'truefalse', q: 'Persamaan 3x + 2y = 10 merupakan contoh PLSV', answer: false, points: 10 },
            ]},
            2: { title: '🌿 Penjumlahan & Pengurangan PLSV', monster: '🦎', monsterName: 'Kadal Operasi', monsterHP: 4, timePerQuestion: 15, questions: [
                { id: 0, type: 'multiple', q: 'Nilai x yang memenuhi persamaan x + 5 = 12 adalah...', options: ['5', '6', '7', '17'], answer: 2, points: 10 },
                { id: 1, type: 'multiple', q: 'Nilai x yang memenuhi persamaan x - 8 = 3 adalah...', options: ['5', '8', '11', '-5'], answer: 2, points: 10 },
                { id: 2, type: 'multiple', q: 'Nilai x dari 15 = x + 7 adalah...', options: ['22', '8', '7', '15'], answer: 1, points: 10 },
                { id: 3, type: 'fill', q: 'Nilai x dari x - 6 = 10 adalah x = ...', answer: '16', points: 15 },
            ]},
            3: { title: '🍃 Perkalian & Pembagian PLSV', monster: '🐺', monsterName: 'Serigala Kalkulasi', monsterHP: 4, timePerQuestion: 20, questions: [
                { id: 0, type: 'multiple', q: 'Nilai x dari persamaan 3x = 15 adalah...', options: ['3', '5', '12', '18'], answer: 1, points: 10 },
                { id: 1, type: 'multiple', q: 'Nilai x dari persamaan x/2 = 8 adalah...', options: ['4', '6', '10', '16'], answer: 3, points: 10 },
                { id: 2, type: 'multiple', q: 'Nilai x dari 4x = 2x + 6 adalah...', options: ['1', '2', '3', '6'], answer: 2, points: 10 },
                { id: 3, type: 'fill', q: 'Nilai x dari 5x = 35 adalah x = ...', answer: '7', points: 15 },
            ]},
            4: { title: '🍂 PLSV Bentuk Kompleks', monster: '🐉', monsterName: 'Naga Kompleks', monsterHP: 4, timePerQuestion: 20, questions: [
                { id: 0, type: 'multiple', q: 'Nilai x dari 2x + 3 = 11 adalah...', options: ['3', '4', '7', '8'], answer: 1, points: 10 },
                { id: 1, type: 'multiple', q: 'Nilai x dari 5x - 2 = 3x + 8 adalah...', options: ['3', '4', '5', '6'], answer: 2, points: 10 },
                { id: 2, type: 'multiple', q: 'Nilai x dari 3(x + 2) = 15 adalah...', options: ['1', '2', '3', '5'], answer: 2, points: 10 },
                { id: 3, type: 'fill', q: 'Nilai x dari 2(3x - 1) = 4x + 10 adalah x = ...', answer: '6', points: 20, alternatives: ['6'] },

            5: { title: '🌳 Soal Cerita PLSV', monster: '🦂', monsterName: 'Kalajengking Cerita', monsterHP: 4, timePerQuestion: 30, questions: [
                { id: 0, type: 'multiple', q: 'Jumlah dua bilangan adalah 20. Bilangan pertama 4 lebihnya dari bilangan kedua. Bilangan pertama adalah...', options: ['8', '10', '12', '14'], answer: 2, points: 15 },
                { id: 1, type: 'multiple', q: 'Umur Ali tiga kali umur Budi. Jumlah umur mereka 32 tahun. Umur Budi adalah...', options: ['6 tahun', '8 tahun', '10 tahun', '12 tahun'], answer: 1, points: 15 },

                { id: 3, type: 'fill', q: '3 buku + 2 pulpen = Rp17.000. Pulpen Rp2.500. Harga 1 buku = Rp...', answer: '4000', points: 20, alternatives: ['4000', '4.000'] },

            6: { title: '👑 Boss Battle: Grand Master PLSV', monster: '👹', monsterName: 'Grand Master PLSV', monsterHP: 6, bossBattle: true, timeLimit: 120, timePerQuestion: 30, questions: [
                { id: 0, type: 'multiple', q: 'Nilai x dari 2(3x - 1) - 3(x + 2) = 4 adalah...', options: ['2', '3', '4', '5'], answer: 2, points: 15 },
                { id: 1, type: 'multiple', q: 'Jumlah tiga bilangan ganjil berurutan 45. Bilangan terbesarnya adalah...', options: ['15', '17', '19', '21'], answer: 1, points: 15 },
                { id: 2, type: 'multiple', q: 'HP dari 2x - 1 = x + 3 adalah...', options: ['{2}', '{3}', '{4}', '{5}'], answer: 2, points: 15 },
                { id: 3, type: 'fill', q: 'Nilai x dari (x + 2) / 3 = 5 adalah x = ...', answer: '13', points: 20, alternatives: ['13'] },
                { id: 4, type: 'multiple', q: 'Umur Ibu 5 tahun lebih muda dari 2 kali umur Ani. Jumlah umur 40 tahun. Umur Ani...', options: ['12 tahun', '15 tahun', '18 tahun', '20 tahun'], answer: 1, points: 15 },
                { id: 5, type: 'truefalse', q: 'Nilai x dari 3x + 2 = 2x + 7 adalah x = 5', answer: true, points: 10 },

        };

        const developerInfo = { title: "👨‍💻 Tim Pengembang", members: [{ name: "Muhammad Riansyah", nim: "2340604022",
                role: "Lead Developer", emoji: "👨‍💻" }, { name: "Anita Suciani", nim: "2340604029",
                role: "Content Designer", emoji: "👩‍🎨" }, { name: "Muhammad Anwar Efendy", nim: "2340604033",
                role: "Game Designer", emoji: "🎮" }, { name: "Risliyanti", nim: "2340604042",
                role: "Quality Assurance", emoji: "🧪" }, ] };
